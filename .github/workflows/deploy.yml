name: Deploy to MonsterASP via SFTP

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.3
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22 # Added to use secure SFTP like your panel shows
          server-dir: /wwwroot/ # Changed to match MonsterASP
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
